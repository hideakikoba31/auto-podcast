name: Daily Podcast Generator

on:
  schedule:
    # 毎日日本時間の朝6時に実行 (UTCで前日21:00)
    - cron: '0 21 * * *'
  # 手動実行用
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install ffmpeg (pydub用)
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Google Cloud Authentication
      uses: google-github-actions/auth@v1
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Run main script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py

    - name: Commit and push generated files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add assets/episodes/ feed.xml episodes.json
        # 変更がある場合のみコミット
        git diff --quiet && git diff --staged --quiet || (git commit -m "Add daily podcast episode" && git push)
